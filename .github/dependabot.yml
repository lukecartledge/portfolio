version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      astro:
        patterns:
          - 'astro'
          - '@astrojs/*'
      contentful:
        patterns:
          - '@contentful/*'
          - 'contentful'
      lint:
        patterns:
          - 'eslint*'
          - '@eslint/*'
          - 'prettier*'
          - 'typescript-eslint'
          - 'eslint-*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
